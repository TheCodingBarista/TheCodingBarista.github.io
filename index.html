<!DOCTYPE html>
<html>
<head>
	<script async src="https://www.googletagmanager.com/gtag/js?id=UA-68906728-2"></script>
	<script>

  		gtag('config', 'UA-68906728-2');

	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>The Coding Barista</title>

	<link rel="icon" href="favicon.ico" type="image/png" />

	<link href="https://fonts.googleapis.com/css?family=Reem+Kufi|Roboto:300" rel="stylesheet">
	<link href="https://use.fontawesome.com/releases/v5.12.0/css/all.css" rel="stylesheet">
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/styles.css">
	<link rel="stylesheet" href="css/themes/green-white.css">
	
	<style>
		body {
  			font-family: Arial, Helvetica, sans-serif;
		}

		.flip-card {
  			background-color: transparent;
  			width: 300px;
  			height: 300px;
  			perspective: 1000px;
			margin: auto;
		}

		.flip-card-inner {
  			position: relative;
  			width: 100%;
  			height: 100%;
  			text-align: center;
  			transition: transform 0.6s;
  			transform-style: preserve-3d;
  			box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
		}

		.flip-card:hover .flip-card-inner {
  			transform: rotateY(180deg);
		}

		.flip-card-front, .flip-card-back {
  			position: absolute;
  			width: 100%;
  			height: 100%;
  			-webkit-backface-visibility: hidden;
  			backface-visibility: hidden;
		}

		.flip-card-front {
  			background-color: #bbb;
  			color: black;
		}

		.flip-card-back {
 			background-color: #2980b9;
  			color: white;
  			transform: rotateY(180deg);
		}
	</style>	
</head>
<body>
	<main>
		<div class="intro"> 
			<p> Hello World, I'm Mel! </p>
			<p> How do you take your Java? </p>
		</div>
		<div class="tagline">Your New Favorite Dev | Flatiron Student | Starbucks Partner </div>
		<br>

		<br>
		<div class="flip-card">
  			<div class="flip-card-inner">
    				<div class="flip-card-front">
      					<img src="public/images/card-1-front.jpg" alt="Testimonial" style="width:300px;height:300px;">
    				</div>
    		<div class="flip-card-back">
      			<h1>John Doe</h1> 
      			<p>Architect & Engineer</p> 
      			<p>We love that guy</p>
    	</div>
		
		<div class="icons-social">
			<a target="_blank" href="https://github.com/TheCodingBarista"><i class="fab fa-github"></i></a>
			<a target="_blank" href="https://twitter.com/NotYourAvgMel"><i class="fab fa-twitter"></i></a>
			<a target="_blank" href="https://dev.to/thecodingbarista"><i class="fab fa-dev"></i></a>
			<a target="_blank" href="https://www.linkedin.com/in/thecodingbarista"><i class="fab fa-linkedin"></i></a>
			<a target="_blank" href="https://www.freecodecamp.org/thecodingbarista"><i class="fab fa-free-code-camp"></i></a>

    	</div>
	</main>
</body>
</html>
